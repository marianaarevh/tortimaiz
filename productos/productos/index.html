<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<div id="navbar"></div>
    <main class="enfasis-bg">
        <section class="section-banner banner-productos">
            <div class="overlay">
                <h1 id="titulo-categoria" class="section-title banner-title">Productos</h1>
            </div>
        </section>
        <section class="productos-section ">
            <div class="container contenedor-section">
                <div id="productos-grid" class="productos-grid">
                    <a class="producto-card" href="/productos/?categoria=tortillas">
                        <div class="producto-img-container">
                        <img src="../../src/assets/img/productos/tortillas/tortilla-blanca.jpg" alt="Tortillas">
                        <div class="producto-overlay"></div>
                        </div>
                        <p class="producto-nombre">Tortillas</p>
                    </a>
                    <a class="producto-card" href="/productos/?categoria=totopos">
                        <div class="producto-img-container">
                        <img src="../../src/assets/img/productos/totopos/banner.jpg" alt="Totopos">
                        <div class="producto-overlay"></div>
                        </div>
                        <p class="producto-nombre">Totopos</p>
                    </a>
                    <a class="producto-card" href="/productos/?categoria=frituras">
                        <div class="producto-img-container">
                        <img src="../../src/assets/img/productos/frituras/taco-bell.jpg" alt="Frituras">
                        <div class="producto-overlay"></div>
                        </div>
                        <p class="producto-nombre">Frituras</p>
                    </a>
                </div>
            </div>
        </section>
    </main>
<div id="footer"></div>
</body>

<script src="../../main.js"></script>
</html>
