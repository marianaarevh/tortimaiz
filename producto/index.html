<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<div id="navbar"></div>
    <main class="enfasis-bg">
        <section class="section-banner banner-producto">
            <div class="overlay">
                <h1 id="producto-titulo" class="section-title"></h1>
            </div>
        </section>

        <section class="producto-detalle">
            <div class="container producto-layout contenedor-section">

                <!-- info -->
                <div class="producto-info">

                <h2 id="producto-nombre" class="title-h2"></h2>

                <p id="producto-descripcion"></p>

                <div class="producto-datos">
                    <p><strong></strong> <span id="producto-presentacion"></span></p>
                    <p><strong>Categoría:</strong> <span id="producto-categoria"></span></p>
                </div>

                <a href="/productos/productos" class="btn-volver">
                    ← Ver más productos
                </a>

                </div>
                <!-- imagen -->
                <div class="producto-imagen">
                <img id="producto-img" src="" alt="">
                </div>

            </div>
        </section>
    </main>
<div id="footer"></div>
</body>
<script src="producto.js"></script>
<script src="../main.js"></script>
</html>
