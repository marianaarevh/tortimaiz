<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Tortimaiz</title>
    <link rel="stylesheet" href="styles.css">
    <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" 
    rel="stylesheet">
</head>

<body>
<div id="navbar"></div>

<section class="section-banner banner-contacto">
  <div class="overlay">
    <h1 class="section-title banner-title">Contáctanos</h1>
  </div>
</section>

<section class="contact-content">
  
  <div class="contact-info">
  <h1 class="title-contact">Ubícanos</h1>
  <h3 class="subtitle-contact">Av. Oaxaca 108, El Mariachi, 83040 Hermosillo, Son.</h3>
  <h2 class="phone-contact">662 217 5887</h2>
  </div>

  <div class="contact-form-container">
    <form class="contact-form">
      
      <div class="row">
        <div>
        <label>Nombre <span class="required">*</span></label>
        <input type="text" placeholder="" required /></div>
        <div>
        <label>Apellido <span class="required">*</span></label>
        <input type="text" placeholder="" required /></div>
      </div>
      <label>Email <span class="required">*</span></label>
      <input type="email" placeholder="" required />
      
      <label>Mensaje <span class="required">*</span></label>
      <textarea placeholder="" rows="5" required></textarea>
      
      <button type="submit">Enviar</button>

      <div class="socials">
        <a href="#">Facebook</a>
        <a href="#">Instagram</a>
      </div>

    </form>
  </div>

</section>

<section class="contact-map">
  <iframe
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3486.762963066107!2d-110.94853722397126!3d29.083148663474347!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x86ce85b415ad7859%3A0x6b7bb0a054f90d34!2sAv.%20Oaxaca%20108%2C%20El%20Mariachi%2C%2083040%20Hermosillo%2C%20Son.!5e0!3m2!1ses-419!2smx!4v1771968496072!5m2!1ses-419!2smx"
    width="100%"
    height="400"
    style="border:0;"
    allowfullscreen=""
    loading="lazy">
  </iframe>
</section>

<div id="footer"></div>
 <script src="main.js"></script>
</body>
</html>
